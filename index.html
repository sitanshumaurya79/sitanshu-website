<!DOCTYPE html>
<html>
<head>
<title>Image Puzzle Game</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#222;
color:white;
}

#board{
width:300px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,100px);
gap:2px;
margin-top:20px;
}

.tile{
width:100px;
height:100px;
background-image:url("https://picsum.photos/300");
background-size:300px 300px;
cursor:pointer;
}

.empty{
background:none;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
}
</style>
</head>

<body>

<h2>Image Puzzle Game</h2>

<p>Time: <span id="time">0</span> sec</p>

<button onclick="restart()">Restart</button>

<div id="board"></div>

<script>

let board=document.getElementById("board");
let time=0;
let timer;

let tiles=[0,1,2,3,4,5,6,7,8];

function startTimer(){
timer=setInterval(()=>{
time++;
document.getElementById("time").innerText=time;
},1000);
}

function restart(){

clearInterval(timer);

time=0;

tiles=[0,1,2,3,4,5,6,7,8];

tiles.sort(()=>Math.random()-0.5);

draw();

startTimer();

}

function draw(){

board.innerHTML="";

tiles.forEach((num,i)=>{

let div=document.createElement("div");

if(num===8){
div.className="tile empty";
}else{

div.className="tile";

let x=(num%3)*-100;
let y=Math.floor(num/3)*-100;

div.style.backgroundPosition=x+"px "+y+"px";

}

div.onclick=()=>move(i);

board.appendChild(div);

});

}

function move(i){

let emptyIndex=tiles.indexOf(8);

let valid=[i-1,i+1,i-3,i+3];

if(valid.includes(emptyIndex)){

[tiles[i],tiles[emptyIndex]]=[tiles[emptyIndex],tiles[i]];

draw();

checkWin();

}

}

function checkWin(){

for(let i=0;i<tiles.length;i++){

if(tiles[i]!==i) return;

}

clearInterval(timer);

alert("Puzzle Solved in "+time+" seconds!");

}

restart();

</script>

</body>
</html>
