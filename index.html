<!DOCTYPE html>
<html>
<head>
<title>Mobile Car Game</title>

<style>
body{
margin:0;
background:#111;
overflow:hidden;
font-family:Arial;
}

#game{
width:360px;
height:600px;
background:#333;
margin:auto;
position:relative;
overflow:hidden;
border:4px solid white;
}

.car{
width:60px;
height:100px;
background:red;
position:absolute;
bottom:20px;
left:150px;
border-radius:10px;
}

.enemy{
width:60px;
height:100px;
background:yellow;
position:absolute;
top:-120px;
border-radius:10px;
}

#score{
color:white;
text-align:center;
font-size:22px;
margin:10px;
}
</style>
</head>

<body>

<div id="score">Score: 0</div>

<div id="game">
<div id="player" class="car"></div>
</div>

<script>

let game=document.getElementById("game");
let player=document.getElementById("player");
let score=0;

function moveLeft(){
let left=player.offsetLeft;
if(left>0){
player.style.left=(left-40)+"px";
}
}

function moveRight(){
let left=player.offsetLeft;
if(left<300){
player.style.left=(left+40)+"px";
}
}

document.addEventListener("touchstart",function(e){
let x=e.touches[0].clientX;

if(x < window.innerWidth/2){
moveLeft();
}else{
moveRight();
}
});

document.addEventListener("keydown",function(e){
if(e.key=="ArrowLeft") moveLeft();
if(e.key=="ArrowRight") moveRight();
});

function createEnemy(){

let enemy=document.createElement("div");
enemy.className="enemy";

enemy.style.left=Math.floor(Math.random()*300)+"px";

game.appendChild(enemy);

let move=setInterval(()=>{

enemy.style.top=(enemy.offsetTop+7)+"px";

if(enemy.offsetTop>600){
enemy.remove();
score++;
document.getElementById("score").innerHTML="Score: "+score;
clearInterval(move);
}

if(
enemy.offsetTop>450 &&
enemy.offsetLeft==player.offsetLeft
){
alert("Game Over! Score: "+score);
location.reload();
}

},30);

}

setInterval(createEnemy,1400);

</script>

</body>
</html>
