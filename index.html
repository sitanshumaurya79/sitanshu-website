<!DOCTYPE html>
<html>
<head>
<title>Shooting Game</title>
<style>
body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#111;
display:block;
margin:auto;
}
</style>
</head>

<body>

<h2>Shooting Game</h2>
<p>Score: <span id="score">0</span></p>

<canvas id="game" width="400" height="600"></canvas>

<script>

let canvas=document.getElementById("game")
let ctx=canvas.getContext("2d")

let player={x:180,y:550,w:40,h:40}
let bullets=[]
let enemies=[]
let score=0

function drawPlayer(){
ctx.fillStyle="lime"
ctx.fillRect(player.x,player.y,player.w,player.h)
}

function drawBullets(){
ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,5,10)
b.y-=7
})
}

function drawEnemies(){
ctx.fillStyle="red"
enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,40,40)
e.y+=2
})
}

function spawnEnemy(){
enemies.push({
x:Math.random()*360,
y:-40
})
}

function collision(a,b){
return a.x<b.x+40 &&
a.x+40>b.x &&
a.y<b.y+40 &&
a.y+40>b.y
}

function update(){

ctx.clearRect(0,0,400,600)

drawPlayer()
drawBullets()
drawEnemies()

bullets.forEach((b,bi)=>{
enemies.forEach((e,ei)=>{

if(collision({x:b.x,y:b.y,w:5,h:10},e)){
bullets.splice(bi,1)
enemies.splice(ei,1)
score++
document.getElementById("score").innerText=score
}

})
})

requestAnimationFrame(update)
}

document.addEventListener("click",()=>{
bullets.push({
x:player.x+18,
y:player.y
})
})

document.addEventListener("mousemove",(e)=>{
let rect=canvas.getBoundingClientRect()
player.x=e.clientX-rect.left-20
})

setInterval(spawnEnemy,1500)

update()

</script>

</body>
</html>
