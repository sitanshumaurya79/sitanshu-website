<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jigsaw Puzzle Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f0f0;
    }
    #puzzle-board {
      width: 600px;
      height: 400px;
      margin: 20px auto;
      border: 2px solid #333;
      display: flex;
      flex-wrap: wrap;
      position: relative;
    }
    .piece {
      width: 200px;
      height: 200px;
      background-size: 600px 400px;
      border: 1px solid #999;
      cursor: grab;
    }
    #pieces-container {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .piece.dragging {
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <h1>🎨 Jigsaw Puzzle Game</h1>
  <div id="puzzle-board"></div>
  <div id="pieces-container"></div>

  <script>
    const board = document.getElementById("puzzle-board");
    const container = document.getElementById("pieces-container");

    // Puzzle image
    const imgSrc = "https://picsum.photos/600/400"; // Random image

    // Create puzzle pieces
    let positions = [
      {x:0,y:0}, {x:200,y:0}, {x:400,y:0},
      {x:0,y:200}, {x:200,y:200}, {x:400,y:200}
    ];

    positions.forEach((pos, index) => {
      let piece = document.createElement("div");
      piece.classList.add("piece");
      piece.style.backgroundImage = `url(${imgSrc})`;
      piece.style.backgroundPosition = `-${pos.x}px -${pos.y}px`;
      piece.setAttribute("data-pos", index);
      container.appendChild(piece);

      piece.draggable = true;

      piece.addEventListener("dragstart", e => {
        piece.classList.add("dragging");
        e.dataTransfer.setData("pos", index);
      });

      piece.addEventListener("dragend", () => {
        piece.classList.remove("dragging");
      });
    });

    // Drop zones
    positions.forEach((pos, index) => {
      let dropZone = document.createElement("div");
      dropZone.classList.add("piece");
      dropZone.style.background = "#ddd";
      dropZone.setAttribute("data-pos", index);

      dropZone.addEventListener("dragover", e => e.preventDefault());

      dropZone.addEventListener("drop", e => {
        let draggedPos = e.dataTransfer.getData("pos");
        let draggedPiece = container.querySelector(`[data-pos='${draggedPos}']`);
        dropZone.style.backgroundImage = draggedPiece.style.backgroundImage;
        dropZone.style.backgroundPosition = draggedPiece.style.backgroundPosition;
      });

      board.appendChild(dropZone);
    });
  </script>
</body>
</html>
