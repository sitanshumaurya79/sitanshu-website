<!DOCTYPE html>
<html>
<head>
<title>10 Mini Games</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#222;
color:white;
}

button{
padding:10px 15px;
margin:5px;
font-size:16px;
cursor:pointer;
}

#game{
margin-top:20px;
font-size:20px;
}
</style>
</head>

<body>

<h1>My 10 Mini Games</h1>

<button onclick="guessGame()">1 Guess Number</button>
<button onclick="diceGame()">2 Dice Roll</button>
<button onclick="coinGame()">3 Coin Toss</button>
<button onclick="tapGame()">4 Tap Speed</button>
<button onclick="mathGame()">5 Math Quiz</button>
<button onclick="colorGame()">6 Color Guess</button>
<button onclick="randomGame()">7 Random Number</button>
<button onclick="yesNoGame()">8 Yes / No</button>
<button onclick="luckyGame()">9 Lucky Number</button>
<button onclick="reactionGame()">10 Reaction Test</button>

<div id="game"></div>

<script>

function guessGame(){
let n=Math.floor(Math.random()*10)+1
let g=prompt("1 se 10 tak number guess karo")
alert(g==n?"Correct!":"Wrong! Number tha "+n)
}

function diceGame(){
let d=Math.floor(Math.random()*6)+1
alert("Dice number: "+d)
}

function coinGame(){
alert(Math.random()<0.5?"Head":"Tail")
}

function tapGame(){
let start=Date.now()
alert("OK dabao aur turant fir OK dabao")
let end=Date.now()
alert("Time: "+(end-start)+" ms")
}

function mathGame(){
let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)
let g=prompt(a+" + "+b+" = ?")
alert(g==(a+b)?"Correct":"Wrong")
}

function colorGame(){
let colors=["Red","Blue","Green","Yellow"]
let c=colors[Math.floor(Math.random()*4)]
let g=prompt("Color guess karo: Red Blue Green Yellow")
alert(g==c?"Correct":"Color tha "+c)
}

function randomGame(){
alert("Random number: "+Math.floor(Math.random()*100))
}

function yesNoGame(){
alert(Math.random()<0.5?"YES":"NO")
}

function luckyGame(){
alert("Lucky number: "+Math.floor(Math.random()*9)+1)
}

function reactionGame(){
let start=Date.now()
alert("OK dabao")
let end=Date.now()
alert("Reaction time "+(end-start)+" ms")
}

</script>

</body>
</html>
