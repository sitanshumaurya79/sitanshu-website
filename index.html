<!DOCTYPE html>
<html>
<head>
<title>5x5 Puzzle Game</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#222;
color:white;
}

#board{
width:450px;
margin:auto;
display:grid;
grid-template-columns:repeat(5,90px);
gap:4px;
margin-top:20px;
}

.tile{
width:90px;
height:90px;
background-image:url("https://picsum.photos/450");
background-size:450px 450px;
cursor:pointer;
border-radius:6px;
}

.empty{
background:none;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
}
</style>

</head>

<body>

<h2>5×5 Image Puzzle</h2>

<p>Time: <span id="time">0</span> sec</p>

<button onclick="restart()">Restart</button>

<div id="board"></div>

<script>

let board=document.getElementById("board");
let size=5;
let tiles=[];
let time=0;
let timer;

function startTimer(){
timer=setInterval(()=>{
time++;
document.getElementById("time").innerText=time;
},1000);
}

function restart(){

clearInterval(timer);
time=0;

tiles=[];

for(let i=0;i<size*size;i++){
tiles.push(i);
}

tiles.sort(()=>Math.random()-0.5);

draw();
startTimer();

}

function draw(){

board.innerHTML="";

tiles.forEach((num,i)=>{

let div=document.createElement("div");

if(num===size*size-1){
div.className="tile empty";
}else{

div.className="tile";

let x=(num%size)*-90;
let y=Math.floor(num/size)*-90;

div.style.backgroundPosition=x+"px "+y+"px";

}

div.onclick=()=>move(i);

board.appendChild(div);

});

}

function move(i){

let emptyIndex=tiles.indexOf(size*size-1);

let row=Math.floor(i/size);
let col=i%size;

let emptyRow=Math.floor(emptyIndex/size);
let emptyCol=emptyIndex%size;

let valid=
(Math.abs(row-emptyRow)==1 && col==emptyCol) ||
(Math.abs(col-emptyCol)==1 && row==emptyRow);

if(valid){

[tiles[i],tiles[emptyIndex]]=[tiles[emptyIndex],tiles[i]];

draw();
checkWin();

}

}

function checkWin(){

for(let i=0;i<tiles.length;i++){
if(tiles[i]!==i) return;
}

clearInterval(timer);

alert("Puzzle Solved in "+time+" seconds!");

}

restart();

</script>

</body>
</html>
