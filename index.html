<!DOCTYPE html>
<html>
<head>
<title>Puzzle Game</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#222;
color:white;
}

#board{
margin:auto;
margin-top:20px;
display:grid;
gap:4px;
}

.tile{
background:#4CAF50;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
border-radius:6px;
color:white;
}

.empty{
background:#222;
}

button{
padding:10px 20px;
font-size:16px;
margin:5px;
}
</style>
</head>

<body>

<h2>Puzzle Game</h2>

<button onclick="startGame(3)">Easy</button>
<button onclick="startGame(4)">Medium</button>
<button onclick="startGame(5)">Hard</button>

<div id="board"></div>

<script>

let board=document.getElementById("board");
let size=3;
let numbers=[];

function startGame(level){

size=level;

numbers=[];

for(let i=1;i<size*size;i++){
numbers.push(i);
}

numbers.push("");

numbers.sort(()=>Math.random()-0.5);

board.style.gridTemplateColumns="repeat("+size+",80px)";

draw();

}

function draw(){

board.innerHTML="";

numbers.forEach((num,i)=>{

let div=document.createElement("div");

div.className="tile";

div.style.width="80px";
div.style.height="80px";

if(num===""){
div.classList.add("empty");
}else{
div.innerText=num;
}

div.onclick=()=>move(i);

board.appendChild(div);

});

}

function move(i){

let emptyIndex=numbers.indexOf("");

let row=Math.floor(i/size);
let col=i%size;

let emptyRow=Math.floor(emptyIndex/size);
let emptyCol=emptyIndex%size;

let valid=
(Math.abs(row-emptyRow)==1 && col==emptyCol) ||
(Math.abs(col-emptyCol)==1 && row==emptyRow);

if(valid){

[numbers[i],numbers[emptyIndex]]=[numbers[emptyIndex],numbers[i]];

draw();

checkWin();

}

}

function checkWin(){

for(let i=0;i<numbers.length-1;i++){
if(numbers[i]!==i+1) return;
}

alert("Puzzle Solved!");

}

</script>

</body>
</html>
